name: ListeningTraining
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
targets:
  ListeningTraining:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Web
        type: folder
        buildPhase: resources
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.listeningtraining
        PRODUCT_NAME: ListeningTraining
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "聆听训练"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "用于录制并回放训练回答，录音不会上传。"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  ListeningTraining:
    build:
      targets:
        ListeningTraining: all
    run:
      config: Debug
    archive:
      config: Release
