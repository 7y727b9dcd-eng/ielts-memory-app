name: WordTUO
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
targets:
  WordTUO:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Web
        type: folder
        buildPhase: resources
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.wordtuo
        PRODUCT_NAME: WordTUO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "单词TUO"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  WordTUO:
    build:
      targets:
        WordTUO: all
    run:
      config: Debug
    archive:
      config: Release
