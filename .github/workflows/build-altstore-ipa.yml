name: Build Listen & Respond IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "AltStore-App/**"
      - "index.html"
      - "styles.css"
      - "app.js"
      - "icons/**"
      - ".github/workflows/build-altstore-ipa.yml"

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Stage web application
        run: |
          rm -rf AltStore-App/Web
          mkdir -p AltStore-App/Web
          cp index.html styles.css app.js manifest.webmanifest sw.js AltStore-App/Web/
          cp -R icons AltStore-App/Web/icons

      - name: Generate Xcode project
        working-directory: AltStore-App
        run: xcodegen generate

      - name: Build unsigned iOS app
        run: |
          set -o pipefail
          xcodebuild \
            -project AltStore-App/IELTSMemory.xcodeproj \
            -scheme IELTSMemory \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee build.log

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/IELTSMemory.app Payload/
          zip -qry ListenRespond-AltStore.ipa Payload

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ListenRespond-AltStore
          path: ListenRespond-AltStore.ipa
          if-no-files-found: error

      - name: Publish downloadable build branch
        if: always()
        run: |
          mkdir -p /tmp/ielts-build-output
          cp build.log /tmp/ielts-build-output/build.log 2>/dev/null || true
          cp ListenRespond-AltStore.ipa /tmp/ielts-build-output/ 2>/dev/null || true
          if [ -f ListenRespond-AltStore.ipa ]; then
            echo "Build succeeded" > /tmp/ielts-build-output/status.txt
          else
            echo "Build failed; inspect build.log" > /tmp/ielts-build-output/status.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan ipa-artifacts-output
          git rm -rf .
          git clean -fdx
          cp -R /tmp/ielts-build-output/. .
          git add .
          git commit -m "Publish AltStore IPA build"
          git push --force origin HEAD:ipa-artifacts
